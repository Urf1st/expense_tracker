server {
    listen 80;

    # Откуда раздаём статику — туда мы и копировали /dist
    root /usr/share/nginx/html;
    index index.html;

    # SPA-роутинг — любой путь (/dashboard, /expenses и т.д.)
    # отдаёт index.html, а React Router сам разберётся
    location / {
        try_files $uri /index.html;
    }

    # Все запросы на /api/ проксируем на бэкенд контейнер
    # backend — это имя сервиса в docker-compose.yml
    location /api/ {
        proxy_pass http://backend:8000;
    }
}